<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="运营管理40题速背复习网页">
  <title>运营管理40题速背</title>
  <style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --text: #272725;
  --muted: #787774;
  --line: #e8e7e4;
  --soft: #f1f1ef;
  --green: #2f7d4a;
  --green-soft: #edf7f0;
  --red: #b54a4a;
  --red-soft: #fff3f2;
  --shadow: 0 1px 2px rgba(15, 15, 15, .04), 0 4px 14px rgba(15, 15, 15, .035);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  color: var(--text);
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  line-height: 1.65;
  transition: color .2s, background .2s;
}
button, input { font: inherit; }
button { color: inherit; }

.hero { background: var(--surface); border-bottom: 1px solid var(--line); }
.hero-inner, .container { width: min(1040px, calc(100% - 40px)); margin: 0 auto; }
.hero-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 42px 0 34px; }
.eyebrow { margin: 0 0 5px; color: var(--green); font-size: 12px; font-weight: 700; letter-spacing: .14em; }
h1 { margin: 0; font-size: clamp(28px, 5vw, 42px); letter-spacing: -.04em; line-height: 1.25; }
.subtitle { margin: 8px 0 0; color: var(--muted); }
.container { padding: 28px 0 70px; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.stat { display: flex; flex-direction: column; padding: 18px 20px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); box-shadow: var(--shadow); }
.stat strong { font-size: 27px; line-height: 1.2; }
.stat span { margin-top: 4px; color: var(--muted); font-size: 13px; }
.progress-stat strong { color: var(--green); }
.correct-stat strong { color: var(--green); }
.wrong-stat strong { color: var(--red); }

.toolbar { position: sticky; z-index: 10; top: 0; padding: 14px; border: 1px solid var(--line); border-radius: 14px; background: color-mix(in srgb, var(--surface) 94%, transparent); box-shadow: var(--shadow); backdrop-filter: blur(12px); }
.unit-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.unit-toolbar span { flex: none; color: var(--muted); font-size: 13px; font-weight: 650; }
.unit-toolbar select { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; outline: none; color: var(--text); background: var(--surface); }
.search-wrap { display: flex; align-items: center; gap: 9px; padding: 0 12px; border: 1px solid var(--line); border-radius: 9px; background: var(--bg); }
.search-wrap span { color: var(--muted); font-size: 21px; transform: rotate(-15deg); }
.search-wrap input { width: 100%; padding: 10px 0; border: 0; outline: 0; color: var(--text); background: transparent; }
.search-wrap input::placeholder { color: var(--muted); }
.actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
button { padding: 8px 13px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); cursor: pointer; transition: transform .15s, border-color .15s, background .15s; }
button:hover { border-color: #b9b8b5; background: var(--soft); }
button:active { transform: scale(.98); }
button.active, button[aria-pressed="true"] { color: var(--green); border-color: #a9cfb5; background: var(--green-soft); }
button.danger { color: var(--red); }
button.primary { color: #fff; border-color: var(--green); background: var(--green); }
button.primary:hover { border-color: var(--green); background: #286d40; }
.icon-btn { flex: none; }

.result-row { display: flex; justify-content: space-between; margin: 22px 2px 12px; color: var(--muted); font-size: 13px; }
#filterHint { color: var(--red); }
.question-list { display: grid; gap: 14px; }
.question-card { scroll-margin-top: 165px; padding: 22px; border: 1px solid var(--line); border-left: 4px solid #d7d6d3; border-radius: 12px; background: var(--surface); box-shadow: var(--shadow); transition: border .2s, background .2s, transform .2s; }
.question-card.mastered { border-color: #9bcaab; border-left-color: var(--green); background: linear-gradient(90deg, var(--green-soft), var(--surface) 18%); }
.question-card.answered-wrong { border-right-color: #e4aaaa; }
.question-card.needs-answer { animation: shake .35s ease 2; border-color: var(--red); }
.question-card.random-hit { animation: pulse 1.15s ease; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 35% { transform: scale(1.012); box-shadow: 0 0 0 5px rgba(47,125,74,.13); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 35% { transform: translateX(-5px); } 70% { transform: translateX(5px); } }
.card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 13px; }
.meta { display: flex; align-items: center; gap: 9px; }
.number { font-weight: 750; font-size: 17px; }
.type-tag { padding: 2px 8px; border-radius: 999px; color: var(--muted); background: var(--soft); font-size: 12px; }
.mastered-badge { color: var(--green); font-size: 13px; font-weight: 600; }
.card-badges { display: flex; align-items: center; flex-wrap: wrap; justify-content: flex-end; gap: 7px; }
.history-wrong-badge { padding: 2px 8px; border-radius: 999px; color: var(--red); background: var(--red-soft); font-size: 12px; font-weight: 650; }
.question-text { margin: 0 0 14px; font-size: 16px; font-weight: 600; }
.options { display: grid; gap: 7px; margin: 0; padding: 0; list-style: none; }
.option { padding: 0; border: 1px solid transparent; border-radius: 7px; color: #4d4c49; background: var(--bg); transition: border-color .15s, background .15s; }
.option label { display: flex; align-items: flex-start; gap: 10px; padding: 9px 11px; cursor: pointer; }
.option input { flex: none; width: 17px; height: 17px; margin: 4px 0 0; accent-color: var(--green); cursor: pointer; }
.option:has(input:checked) { border-color: #aebeb3; }
.option.correct-option { border-color: #8fc29f; color: var(--green); background: var(--green-soft); font-weight: 650; }
.option.wrong-option { border-color: #dda09c; color: var(--red); background: var(--red-soft); }
.calculation-note { padding: 12px 14px; border-radius: 8px; color: var(--muted); background: var(--soft); }
.card-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 17px; padding-top: 14px; border-top: 1px solid var(--line); }
.answer-panel { margin-top: 14px; padding: 13px 15px; border: 1px solid #bcdcc5; border-radius: 8px; color: var(--green); background: var(--green-soft); font-weight: 700; }
.answer-panel[hidden] { display: none; }
.submit-result { display: flex; flex-wrap: wrap; gap: 8px 20px; margin-top: 14px; padding: 13px 15px; border: 1px solid; border-radius: 8px; }
.submit-result strong { width: 100%; }
.correct-result { color: var(--green); border-color: #9bcaab; background: var(--green-soft); }
.wrong-result { color: var(--red); border-color: #dda09c; background: var(--red-soft); }
.corrected-note { padding: 1px 7px; border-radius: 999px; color: var(--red); background: var(--red-soft); font-size: 12px; font-weight: 650; }
.master-btn.is-mastered { color: var(--green); border-color: #9bcaab; background: var(--green-soft); }
.empty { padding: 60px 20px; text-align: center; color: var(--muted); }
.empty div { color: var(--text); font-size: 18px; font-weight: 650; }
.back-top { position: fixed; right: 22px; bottom: 22px; width: 42px; height: 42px; padding: 0; border-radius: 50%; box-shadow: var(--shadow); opacity: 0; pointer-events: none; }
.back-top.visible { opacity: 1; pointer-events: auto; }

body.dark {
  --bg: #191919; --surface: #242424; --text: #efefed; --muted: #a4a39f; --line: #383838; --soft: #303030;
  --green: #79c791; --green-soft: #22362a; --red: #ed8d8d; --red-soft: #3a2626; --shadow: 0 2px 12px rgba(0,0,0,.2);
}
body.dark .option { color: #d0cfca; }
body.dark button.primary { color: #102416; background: var(--green); }

@media (max-width: 700px) {
  .hero-inner, .container { width: min(100% - 24px, 1040px); }
  .hero-inner { align-items: flex-start; padding: 28px 0 24px; }
  .subtitle { font-size: 14px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .stat { padding: 14px 16px; }
  .toolbar { top: 6px; }
  .actions { display: grid; grid-template-columns: repeat(2, 1fr); }
  .actions button { padding: 9px 6px; font-size: 13px; }
  .question-card { scroll-margin-top: 225px; padding: 17px 15px; }
  .card-head { align-items: flex-start; }
  .mastered-badge { font-size: 0; }
  .mastered-badge:not(:empty)::after { content: "✓"; font-size: 14px; }
  .icon-btn { padding: 7px 9px; font-size: 12px; }
  .card-actions button { flex: 1 1 calc(50% - 8px); padding-inline: 6px; font-size: 13px; }
  .submit-result { display: grid; gap: 3px; }
}

@media (max-width: 390px) {
  .hero-inner { display: block; }
  .icon-btn { margin-top: 14px; }
}

</style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div>
        <p class="eyebrow">OPERATIONS MANAGEMENT</p>
        <h1>运营管理40题速背</h1>
        <p class="subtitle">轻量复习 · 即开即用 · 进度自动保存</p>
      </div>
      <button id="themeToggle" class="icon-btn" type="button" aria-label="切换深色模式">☾ 深色模式</button>
    </div>
  </header>

  <main class="container">
    <section class="stats" aria-label="题库统计">
      <div class="stat"><strong id="totalCount">40</strong><span>题目总数</span></div>
      <div class="stat"><strong id="multipleCount">25</strong><span>选择题</span></div>
      <div class="stat"><strong id="judgeCount">15</strong><span>判断题</span></div>
      <div class="stat progress-stat"><strong id="masteredCount">0</strong><span>已掌握</span></div>
      <div class="stat"><strong id="answeredCount">0</strong><span>已作答</span></div>
      <div class="stat correct-stat"><strong id="correctCount">0</strong><span>正确</span></div>
      <div class="stat wrong-stat"><strong id="wrongCount">0</strong><span>错题记录</span></div>
      <div class="stat"><strong id="accuracyCount">—</strong><span>正确率</span></div>
    </section>

    <section class="toolbar" aria-label="复习工具">
      <div class="unit-toolbar">
        <span>选择单元</span>
        <select id="unitSelect" aria-label="选择题库单元"></select>
      </div>
      <div class="search-wrap">
        <span aria-hidden="true">⌕</span>
        <input id="searchInput" type="search" placeholder="搜索题号或关键词…" autocomplete="off" aria-label="搜索题目">
      </div>
      <div class="actions">
        <button id="submitAll" class="primary" type="button">提交全部</button>
        <button id="clearAll" type="button">清空全部</button>
        <button id="showAll" type="button">展开全部答案</button>
        <button id="hideAll" type="button">隐藏全部答案</button>
        <button id="unmasteredOnly" type="button" aria-pressed="false">只看未掌握</button>
        <button id="wrongOnly" type="button" aria-pressed="false">只看错题</button>
        <button id="unansweredOnly" type="button" aria-pressed="false">只看未作答</button>
        <button id="showAllQuestions" type="button" aria-pressed="true">显示全部题目</button>
        <button id="randomQuestion" type="button">随机抽题</button>
        <button id="resetMastered" class="danger" type="button">重置掌握状态</button>
      </div>
    </section>

    <div class="result-row">
      <span id="resultCount">显示 40 道题</span>
      <span id="filterHint" hidden></span>
    </div>
    <section id="questionList" class="question-list" aria-live="polite"></section>
    <div id="emptyState" class="empty" hidden>
      <div>没有找到匹配的题目</div>
      <small>换个关键词试试吧。</small>
    </div>
  </main>

  <button id="backToTop" class="back-top" type="button" aria-label="返回顶部">↑</button>
  <script>
const questions = [
  { id: 1, type: "multiple", question: "某种零件的需要量是由哪些项决定的？", options: ["A. 净需要量", "B. 现有数", "C. 上层元件的计划发出订货量", "D. 上层元件的总需要量"], answer: "ABCD" },
  { id: 2, type: "multiple", question: "流程分析的常用方法包括", options: ["A. 头脑风暴法", "B. 德尔菲法", "C. 5W1H分析法", "D. 鱼骨图", "E. 层次分析法"], answer: "ACD" },
  { id: 3, type: "multiple", question: "企业选址主要考虑的因素包括", options: ["A. 核心战略", "B. 地理文化", "C. 经济财务", "D. 政治法律", "E. 社会文化"], answer: "ABCDE" },
  { id: 4, type: "multiple", question: "流程优化的目的包括以下哪些", options: ["A. 降低成本", "B. 改善用户体验", "C. 提高效率", "D. 增强灵活性", "E. 提升员工工作积极性"], answer: "ABCD" },
  { id: 5, type: "multiple", question: "对于订货型企业，在年度生产计划中，确定（ ）是最重要的决策。", options: ["A. 品种", "B. 交货期", "C. 成本", "D. 价格", "E. 产量"], answer: "BD" },
  { id: 6, type: "multiple", question: "处理非均匀需求的调整能力策略主要包括以下哪些", options: ["A. 利用库存调节", "B. 转包", "C. 利用兼职员工", "D. 改变劳动力数量", "E. 员工加班加点"], answer: "ABCDE" },
  { id: 7, type: "multiple", question: "下列不属于中期计划的是（ ）。", options: ["A. 主生产计划", "B. 车间作业计划", "C. 资源能力计划", "D. 物料需求计划"], answer: "BCD" },
  { id: 8, type: "multiple", question: "从概念上讲，JIT可做到（ ）", options: ["A. 没有等待零件加工的机器", "B. 没有无事可干的工人", "C. 仓库里没有存货", "D. 工作在加工过程中没有等待"], answer: "ABCD" },
  { id: 9, type: "multiple", question: "MRP的扩展大致经历了以下哪几个阶段？", options: ["A. 闭环MRP", "B. ERP", "C. MRPII", "D. 开环MRP"], answer: "ABC" },
  { id: 10, type: "multiple", question: "库存状态信息包括（ ）", options: ["A. 订购批量", "B. 计划入库量", "C. 提前期", "D. 当前库存量", "E. 安全库存量"], answer: "ABCDE" },
  { id: 11, type: "multiple", question: "对于订货型企业，在年度生产计划中，确定（ ）是最重要的决策。", options: ["A. 交货期", "B. 成本", "C. 价格", "D. 产量", "E. 品种"], answer: "AC" },
  { id: 12, type: "multiple", question: "下列关于新产品开发重要性的说法正确的是（ ）", options: ["A. 新产品能帮助企业掌握市场动向", "B. 新产品开发直接关系到企业的生存和发展", "C. 企业要靠新产品去占领市场一席之地", "D. 企业靠新产品才能赢得竞争优势"], answer: "BCD" },
  { id: 13, type: "multiple", question: "下列不属于中期计划的是（ ）。", options: ["A. 主生产计划", "B. 资源能力计划", "C. 车间作业计划", "D. 物料需求计划"], answer: "BCD" },
  { id: 14, type: "multiple", question: "企业的生产计划主要包括（ ）", options: ["A. 综合生产计划", "B. 资源能力计划", "C. 产品交付计划", "D. 产品出产计划"], answer: "ACD" },
  { id: 15, type: "multiple", question: "服务蓝图包含了三条分界线为（ ）", options: ["A. 顾客分界线", "B. 互动分界线", "C. 支持分界线", "D. 内部互动线", "E. 可视分界线"], answer: "BDE" },
  { id: 16, type: "multiple", question: "生产运作管理的基本内容包括哪些？", options: ["A. 生产运作系统设计", "B. 生产运作运行", "C. 生产运作战略决策", "D. 新型生产经营方式"], answer: "ABCD" },
  { id: 17, type: "multiple", question: "固定量系统就是（ ）都为固定的量的库存控制系统。", options: ["A. 订货量", "B. 订货提前期", "C. 订货点", "D. 采购时间间隔"], answer: "AC" },
  { id: 18, type: "multiple", question: "根据对物品需求是否重复可将物品分为哪几种需求（ ）", options: ["A. 单周期需求", "B. 独立需求", "C. 多周期需求", "D. 相关需求"], answer: "AC" },
  { id: 19, type: "multiple", question: "企业战略管理的过程包括（ ）。", options: ["A. 战略选择", "B. 战略分析", "C. 战略实施", "D. 战略决策", "E. 确定企业使命"], answer: "ABCE" },
  { id: 20, type: "multiple", question: "生产运作系统的设计通常包括以下哪几个方面的策略？", options: ["A. 岗位设计", "B. 供需匹配", "C. 设施布局", "D. 企业选址", "E. 工作考核和报酬"], answer: "ACDE" },
  { id: 21, type: "multiple", question: "下列企业中，选址时“靠近原材料产地”会成为核心考量的有（ ）", options: ["A. 制糖厂", "B. 服装厂", "C. 家具厂", "D. 面包店", "E. 炼油厂"], answer: "ACE" },
  { id: 22, type: "multiple", question: "按生产产品或提供服务的驱动方式可将流程划分为（ ）", options: ["A. 流水作业流程", "B. 拉式流程", "C. 混合流程", "D. 推式流程", "E. 单件作业流程"], answer: "BCD" },
  { id: 23, type: "multiple", question: "处理非均匀需求中改变需求的策略包括（ ）", options: ["A. 推迟交货", "B. 改变价格转移需求", "C. 顾客自助", "D. 开发预定系统"], answer: "ABD" },
  { id: 24, type: "multiple", question: "企业的生产计划主要包括（ ）", options: ["A. 产品出产计划", "B. 资源能力计划", "C. 产品交付计划", "D. 综合生产计划"], answer: "ACD" },
  { id: 25, type: "multiple", question: "影响设施布置的关键主导因素包括下列哪些（ ）", options: ["A. 产品结构和工艺特点", "B. 企业协作水平", "C. 企业技术水平", "D. 物料搬运成本", "E. 产品产量和服务规模"], answer: "ABCE" },
  { id: 26, type: "judge", question: "运输公司属于顾客参与的服务生产。（ ）", options: ["A. 对", "B. 错"], answer: "B（错）" },
  { id: 27, type: "judge", question: "生产运作管理的基本目标主要包括质量管理、成本管理及进度管理。（ ）", options: ["A. 对", "B. 错"], answer: "B（错）" },
  { id: 28, type: "judge", question: "管理和调节产能的办法有改变劳动力数量、采取超售策略、开发预订（约）系统、形成可调节产能等。（ ）", options: ["A. 对", "B. 错"], answer: "B（错）" },
  { id: 29, type: "judge", question: "固定量系统就是订货点和订货间隔都为固定量的库存控制系统。（ ）", options: ["A. 对", "B. 错"], answer: "B（错）" },
  { id: 30, type: "judge", question: "订货型生产的生产效率较低。（ ）", options: ["A. 对", "B. 错"], answer: "B（错）" },
  { id: 31, type: "judge", question: "MRP计算物料需求时，同一物料按其在各个BOM中的最高层次编码。（ ）", options: ["A. 对", "B. 错"], answer: "B（错）" },
  { id: 32, type: "judge", question: "我们通常所说的“某电视机生产企业年产电视机多少台”，是按代表产品来计算的。（ ）", options: ["A. 对", "B. 错"], answer: "A（对）" },
  { id: 33, type: "judge", question: "滚动计划的连续性和应变性好，但严肃性差。（ ）", options: ["A. 对", "B. 错"], answer: "B（错）" },

(() => {
  "use strict";

  const MASTERED_KEY = "operations-management-mastered-v1";
  const ANSWERS_KEY = "operations-management-answers-v2";
  const THEME_KEY = "operations-management-theme-v1";
  const originalUnit = { name: "原40题复习题库", questions: questions.map(q => ({ ...q, unit: "原40题复习题库", sourceNumber: q.id })) };
  const unitGroups = [originalUnit, ...courseUnits];
  const allQuestions = unitGroups.flatMap(unit => unit.questions);
  const list = document.getElementById("questionList");
  const searchInput = document.getElementById("searchInput");
  const emptyState = document.getElementById("emptyState");
  const unitSelect = document.getElementById("unitSelect");
  const openAnswers = new Set();
  let filterMode = "all";
  let activeUnit = originalUnit.name;
  let mastered = readJSON(MASTERED_KEY, [], value => new Set(Array.isArray(value) ? value.map(Number) : []));
  let answerState = readJSON(ANSWERS_KEY, {}, value => value && typeof value === "object" ? value : {});

  function readJSON(key, fallback, transform = value => value) {
    try { return transform(JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback))); }
    catch (_) { return transform(fallback); }
  }

  function saveMastered() {
    localStorage.setItem(MASTERED_KEY, JSON.stringify([...mastered]));
  }

  function saveAnswers() {
    localStorage.setItem(ANSWERS_KEY, JSON.stringify(answerState));
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
  }

  function normalizedAnswer(q) {
    if (q.type === "judge") {
      if (q.answer.includes("对")) return "A";
      if (q.answer.includes("错")) return "B";
    }
    return (q.answer.match(/[A-E]/g) || []).sort().join("");
  }

  function normalizedSelection(selected) {
    return [...new Set(selected || [])].sort().join("");
  }

  function stateFor(id) {
    const state = answerState[id] || {};
    return {
      selected: Array.isArray(state.selected) ? state.selected.filter(x => /^[A-E]$/.test(x)) : [],
      submitted: Boolean(state.submitted),
      correct: Boolean(state.correct),
      everWrong: Boolean(state.everWrong) || (Boolean(state.submitted) && !Boolean(state.correct)),
      attempts: Number(state.attempts) || (state.submitted ? 1 : 0)
    };
  }

  function getFilteredQuestions() {
    const keyword = searchInput.value.trim().toLowerCase();
    return allQuestions.filter(q => {
      if (q.unit !== activeUnit) return false;
      const state = stateFor(q.id);
      if (filterMode === "unmastered" && mastered.has(q.id)) return false;
      if (filterMode === "wrong" && !state.everWrong) return false;
      if (filterMode === "unanswered" && state.submitted) return false;
      if (!keyword) return true;
      const haystack = [q.id, q.question, ...q.options].join(" ").toLowerCase();
      const normalized = keyword.replace(/^第|题$/g, "");
      return haystack.includes(keyword) || String(q.id) === normalized;
    });
  }

  function optionTemplate(q, option, state) {
    const letter = option.charAt(0).toUpperCase();
    const selected = state.selected.includes(letter);
    const correctLetters = normalizedAnswer(q);
    const isCorrectOption = state.submitted && correctLetters.includes(letter);
    const isWrongChoice = state.submitted && selected && !correctLetters.includes(letter);
    const classes = ["option", isCorrectOption ? "correct-option" : "", isWrongChoice ? "wrong-option" : ""].filter(Boolean).join(" ");
    const type = q.type === "multiple" ? "checkbox" : "radio";
    return `<li class="${classes}"><label><input type="${type}" name="question-${q.id}" value="${letter}" ${selected ? "checked" : ""}><span>${escapeHtml(option)}</span></label></li>`;
  }

  function resultTemplate(q, state) {
    if (!state.submitted) return "";
    const yours = state.selected.length ? normalizedSelection(state.selected) : "未选择";
    return `<div class="submit-result ${state.correct ? "correct-result" : "wrong-result"}" role="status">
      <strong>${state.correct ? "✓ 回答正确" : "✕ 回答错误"}</strong>
      <span>你的答案：${escapeHtml(yours)}</span>
      <span>正确答案：${escapeHtml(q.answer)}</span>
      ${state.everWrong && state.correct ? '<span class="corrected-note">已订正 · 曾答错</span>' : ""}
    </div>`;
  }

  function cardTemplate(q) {
    const isMastered = mastered.has(q.id);
    const state = stateFor(q.id);
    const answerOpen = openAnswers.has(q.id);
    const resultClass = state.submitted ? (state.correct ? " answered-correct" : " answered-wrong") : "";
    return `
      <article class="question-card${isMastered ? " mastered" : ""}${resultClass}" id="question-${q.id}" data-id="${q.id}">
        <div class="card-head">
          <div class="meta"><span class="number">第 ${q.sourceNumber || q.id} 题</span><span class="type-tag">${q.type === "judge" ? "判断题" : q.type === "single" ? "单选题" : q.type === "calculation" ? "计算题" : "多选题"}</span></div>
          <span class="card-badges">${state.everWrong ? `<span class="history-wrong-badge">${state.correct ? "已订正 · 曾答错" : "曾答错"}</span>` : ""}<span class="mastered-badge">${isMastered ? "✓ 已掌握" : "未掌握"}</span></span>
        </div>
        <p class="question-text">${escapeHtml(q.question)}</p>
        ${q.type === "calculation" ? '<div class="calculation-note">请先自行计算，再点击“显示答案”核对解题过程。</div>' : `<ul class="options">${q.options.map(option => optionTemplate(q, option, state)).join("")}</ul>`}
        <div class="card-actions">
          ${q.type === "calculation" ? "" : '<button class="submit-btn primary" type="button">提交本题</button><button class="clear-btn" type="button">清空选择</button>'}
          <button class="answer-btn" type="button" aria-expanded="${answerOpen}">${answerOpen ? "隐藏答案" : "显示答案"}</button>
          <button class="master-btn${isMastered ? " is-mastered" : ""}" type="button">${isMastered ? "取消掌握" : "已掌握"}</button>
        </div>
        ${resultTemplate(q, state)}
        <div class="answer-panel" ${answerOpen ? "" : "hidden"}>正确答案：${escapeHtml(q.answer)}</div>
      </article>`;
  }

  function updateStats() {
    const currentQuestions = allQuestions.filter(q => q.unit === activeUnit);
    const states = currentQuestions.map(q => stateFor(q.id)).filter(state => state.submitted);
    const correct = states.filter(state => state.correct).length;
    const wrong = currentQuestions.filter(q => stateFor(q.id).everWrong).length;
    document.getElementById("masteredCount").textContent = mastered.size;
    document.getElementById("answeredCount").textContent = states.length;
    document.getElementById("correctCount").textContent = correct;
    document.getElementById("wrongCount").textContent = wrong;
    document.getElementById("accuracyCount").textContent = states.length ? `${Math.round(correct / states.length * 100)}%` : "—";
    document.getElementById("totalCount").textContent = currentQuestions.length;
    document.getElementById("multipleCount").textContent = currentQuestions.filter(q => q.type === "multiple" || q.type === "single").length;
    document.getElementById("judgeCount").textContent = currentQuestions.filter(q => q.type === "judge").length;
  }

  function render() {
    const visible = getFilteredQuestions();
    list.innerHTML = visible.map(cardTemplate).join("");
    emptyState.hidden = visible.length !== 0;
    document.getElementById("resultCount").textContent = `显示 ${visible.length} 道题`;
    updateStats();
  }

  function submitQuestion(id) {
    const q = allQuestions.find(item => item.id === id);
    const state = stateFor(id);
    if (!state.selected.length) return false;
    state.submitted = true;
    state.correct = normalizedSelection(state.selected) === normalizedAnswer(q);
    state.attempts += 1;
    state.everWrong = state.everWrong || !state.correct;
    answerState[id] = state;
    return true;
  }

  function setFilter(mode) {
    filterMode = mode;
    const buttons = { unmastered: "unmasteredOnly", wrong: "wrongOnly", unanswered: "unansweredOnly", all: "showAllQuestions" };
    Object.entries(buttons).forEach(([key, id]) => document.getElementById(id).setAttribute("aria-pressed", String(key === mode)));
    const labels = { unmastered: "正在只看未掌握题目", wrong: "正在只看错题", unanswered: "正在只看未作答题目" };
    const hint = document.getElementById("filterHint");
    hint.hidden = mode === "all";
    hint.textContent = labels[mode] || "";
    render();
  }

  function setAllAnswers(show) {
    getFilteredQuestions().forEach(q => show ? openAnswers.add(q.id) : openAnswers.delete(q.id));
    render();
  }

  list.addEventListener("change", event => {
    if (!event.target.matches('input[type="checkbox"], input[type="radio"]')) return;
    const card = event.target.closest(".question-card");
    const id = Number(card.dataset.id);
    const inputs = [...card.querySelectorAll(".option input:checked")];
    const previous = stateFor(id);
    answerState[id] = { selected: inputs.map(input => input.value), submitted: false, correct: false, everWrong: previous.everWrong, attempts: previous.attempts };
    saveAnswers();
    render();
  });

  list.addEventListener("click", event => {
    const card = event.target.closest(".question-card");
    if (!card) return;
    const id = Number(card.dataset.id);
    if (event.target.closest(".submit-btn")) {
      if (!submitQuestion(id)) {
        card.classList.add("needs-answer");
        setTimeout(() => card.classList.remove("needs-answer"), 900);
        return;
      }
      saveAnswers();
      render();
    } else if (event.target.closest(".clear-btn")) {
      const previous = stateFor(id);
      answerState[id] = { selected: [], submitted: false, correct: false, everWrong: previous.everWrong, attempts: previous.attempts };
      saveAnswers();
      render();
    } else if (event.target.closest(".answer-btn")) {
      openAnswers.has(id) ? openAnswers.delete(id) : openAnswers.add(id);
      render();
    } else if (event.target.closest(".master-btn")) {
      mastered.has(id) ? mastered.delete(id) : mastered.add(id);
      saveMastered();
      render();
    }
  });

  searchInput.addEventListener("input", render);
  document.getElementById("showAll").addEventListener("click", () => setAllAnswers(true));
  document.getElementById("hideAll").addEventListener("click", () => setAllAnswers(false));
  document.getElementById("unmasteredOnly").addEventListener("click", () => setFilter("unmastered"));
  document.getElementById("wrongOnly").addEventListener("click", () => setFilter("wrong"));
  document.getElementById("unansweredOnly").addEventListener("click", () => setFilter("unanswered"));
  document.getElementById("showAllQuestions").addEventListener("click", () => setFilter("all"));
  document.getElementById("submitAll").addEventListener("click", () => {
    allQuestions.filter(q => q.unit === activeUnit && q.type !== "calculation").forEach(q => submitQuestion(q.id));
    saveAnswers();
    render();
  });
  document.getElementById("clearAll").addEventListener("click", () => {
    if (Object.keys(answerState).length && !window.confirm("确定要清空全部作答记录吗？")) return;
    answerState = {};
    saveAnswers();
    setFilter("all");
  });
  document.getElementById("resetMastered").addEventListener("click", () => {
    if (mastered.size && !window.confirm("确定要清除全部已掌握状态吗？")) return;
    mastered.clear();
    saveMastered();
    render();
  });
  document.getElementById("randomQuestion").addEventListener("click", () => {
    const pool = getFilteredQuestions();
    if (!pool.length) return;
    const chosen = pool[Math.floor(Math.random() * pool.length)];
    const card = document.getElementById(`question-${chosen.id}`);
    card.scrollIntoView({ behavior: "smooth", block: "center" });
    card.classList.remove("random-hit");
    void card.offsetWidth;
    card.classList.add("random-hit");
  });

  unitSelect.innerHTML = unitGroups.map(unit => `<option value="${escapeHtml(unit.name)}">${escapeHtml(unit.name)}（${unit.questions.length}题）</option>`).join("");
  unitSelect.addEventListener("change", () => {
    activeUnit = unitSelect.value;
    searchInput.value = "";
    setFilter("all");
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  const themeToggle = document.getElementById("themeToggle");
  function applyTheme(theme) {
    const dark = theme === "dark";
    document.body.classList.toggle("dark", dark);
    themeToggle.textContent = dark ? "☀ 浅色模式" : "☾ 深色模式";
  }
  applyTheme(localStorage.getItem(THEME_KEY) || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
  themeToggle.addEventListener("click", () => {
    const theme = document.body.classList.contains("dark") ? "light" : "dark";
    localStorage.setItem(THEME_KEY, theme);
    applyTheme(theme);
  });

  const backToTop = document.getElementById("backToTop");
  window.addEventListener("scroll", () => backToTop.classList.toggle("visible", window.scrollY > 500), { passive: true });
  backToTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  render();
})();

  </script>
</body>
</html>
